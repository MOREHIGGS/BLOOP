# Learning how this works as I go so lots of comments
# Random comment to test CI
name: Docker Image CI

on:
  # Trigger this CI on a PR
  pull_request:
    # If you are making a PR to main
    branches: [ "main" ]

jobs:
  build-and-test:
  # Build the container image on the lastest version of ubuntu
    runs-on: ubuntu-latest
    steps:
    # Uses an external libary to clone BLOOP into the vm running CI
      - uses: actions/checkout@v4
      - name: Build the Docker image
      # Note: Tag is required arg and is useful for other people to get this image, 
      # This CI is simple enough that we don't need so just keep overwritting the image
        run: docker build . --file Dockerfile --tag bloop:latest
      - name: Show CPU info
        run: |
            echo "== Runner CPU =="
            lscpu cat /proc/cpuinfo | grep "model name" | head -1

      - name: Show CPU info inside container
        run: |
            docker run --rm bloop /bin/bash -c "lscpu; cat /proc/cpuinfo | grep 'model name' | head -1"
      - name: Run integration tests
        run: docker run --rm --mount type=bind,src=$PWD,target=/Bloop bloop /bin/bash -c "python3 /Bloop/Source/Tests.py"
      - name: Upload diff files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
            name: integration-test-diffs
            path: Run/*Diff.txt
